    *, *::before, *::after {

    .embed-shell::before {

    .embed-shell::after {
      content: "";

      inset: -20% 20% auto;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 231, 255, 0.22), transparent 70%);
      filter: blur(24px);
      opacity: 0.75;
      pointer-events: none;
      z-index: 0;
    }

  <main class="focus-shell">

          id="playlistEmbed"
          title="Spotify Embed: 2026 VIRAL EDIT SONGS"
          loading="lazy"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          src="https://open.spotify.com/embed/playlist/3P8QL7XcWeBylAV9PRttd8?utm_source=generator">

            <span class="play-icon" aria-hidden="true"></span>

  </main>

  <script>
    const META_PIXEL_ID = document.querySelector('meta[name="meta-pixel-id"]')?.content.trim() || "";
    const META_PIXEL_ENABLED = /^\d+$/.test(META_PIXEL_ID);

    function initializeMetaPixel() {
      if (!META_PIXEL_ENABLED || window.fbq) return;

      !function(f,b,e,v,n,t,s) {
        if (f.fbq) return;
        n = f.fbq = function() {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = true;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = true;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      }(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");

      window.fbq("init", META_PIXEL_ID);
      window.fbq("track", "PageView");
      window.fbq("track", "ViewContent", {
        content_name: "Sigma Spotify Playlist",
        content_category: "Music Playlist",
        content_ids: ["3P8QL7XcWeBylAV9PRttd8"],
        content_type: "product"
      });
    }

    function trackMetaEvent(eventName, parameters = {}) {
      if (!META_PIXEL_ENABLED || typeof window.fbq !== "function") return;
      window.fbq("trackCustom", eventName, {
        playlist_id: "3P8QL7XcWeBylAV9PRttd8",
        destination: "spotify",
        ...parameters
      });
    }

    initializeMetaPixel();

    document.querySelectorAll("[data-meta-event]").forEach((link) => {
      link.addEventListener("click", () => {
        trackMetaEvent(link.dataset.metaEvent, {
          placement: link.dataset.metaPlacement || "unknown",
          destination: link.id === "playButton" ? "spotify" : "sigmalabel.xyz"
        });
      });
    });

    const PLAYLIST_URL = "https://open.spotify.com/playlist/3P8QL7XcWeBylAV9PRttd8?si=b709896688e9495e";
    const FALLBACK_PLAYLIST = {
      title: "2026 VIRAL EDIT SONGS 📈",
      iframeUrl: "https://open.spotify.com/embed/playlist/3P8QL7XcWeBylAV9PRttd8?utm_source=generator"
    };
    FALLBACK_PLAYLIST.title = "2026 VIRAL EDIT SONGS \u{1F4C8}";

    const playlistEmbed = document.getElementById("playlistEmbed");
    const playButton = document.getElementById("playButton");

    function applyPlaylistData(data) {
      const title = data?.title || FALLBACK_PLAYLIST.title;
      const iframeUrl = data?.iframe_url || FALLBACK_PLAYLIST.iframeUrl;

      if (playlistEmbed) {
        playlistEmbed.src = iframeUrl;
        playlistEmbed.title = `Spotify Embed: ${title}`;
      }

      if (playButton) {
        playButton.setAttribute("aria-label", `Play ${title} on Spotify`);
      }

      document.title = `${title} | Sigma Label LLC`;
    }

    async function syncSpotifyPlaylist() {
      applyPlaylistData(FALLBACK_PLAYLIST);

      try {
        const response = await fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(PLAYLIST_URL)}`, {
          headers: {
            Accept: "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Spotify metadata request failed");
        }

        const data = await response.json();
        applyPlaylistData(data);
      } catch (error) {
        applyPlaylistData(FALLBACK_PLAYLIST);
      }
    }

    syncSpotifyPlaylist();
  </script>
</body>
</html>
