<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viral TikTok Edits | Sigma Label LLC</title>
  <link rel="icon" type="image/png" href="../assets/branding/label-icon.png" />
  <link rel="shortcut icon" href="../assets/branding/label-icon.png" />
  <link rel="apple-touch-icon" href="../assets/branding/label-icon.png" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Syne:wght@700;800&display=swap");

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-900: #030609;
      --bg-860: #08111a;
      --text: #eff6fd;
      --muted: #a1b6c8;
      --brand-cyan: #00e7ff;
      --brand-lime: #8bff5a;
      --line: rgba(144, 182, 210, 0.2);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(780px 540px at 10% 0%, rgba(0, 231, 255, 0.15), transparent 64%),
        radial-gradient(840px 580px at 90% 10%, rgba(139, 255, 90, 0.11), transparent 62%),
        linear-gradient(180deg, var(--bg-900) 0%, var(--bg-860) 50%, var(--bg-900) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, black 38%, transparent 82%);
      -webkit-mask-image: radial-gradient(circle at center, black 38%, transparent 82%);
      z-index: -4;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.03) 62%, transparent 70%);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.16),
        0 0 42px rgba(0, 231, 255, 0.14);
      backdrop-filter: blur(16px);
      animation: floatOrb 18s ease-in-out infinite;
      z-index: -2;
    }

    .orb-a {
      width: 220px;
      height: 220px;
      top: 84px;
      left: -70px;
    }

    .orb-b {
      width: 170px;
      height: 170px;
      right: 3%;
      bottom: 14%;
      animation-duration: 22s;
      animation-delay: -7s;
    }

    .orb-c {
      width: 110px;
      height: 110px;
      left: 14%;
      bottom: 8%;
      animation-duration: 15s;
      animation-delay: -3s;
    }

    .focus-shell {
      width: min(720px, 100%);
      display: grid;
      justify-items: center;
      gap: 20px;
      text-align: center;
    }

    .playlist-title {
      font-family: "Syne", sans-serif;
      font-size: clamp(2.5rem, 7vw, 4.9rem);
      line-height: 0.96;
      letter-spacing: -1.15px;
      text-wrap: balance;
      text-shadow: 0 0 36px rgba(0, 231, 255, 0.18);
    }

    .embed-shell {
      position: relative;
      width: min(100%, 660px);
      border-radius: 34px;
      border: 1px solid var(--line);
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03)),
        rgba(9, 15, 22, 0.9);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        var(--shadow),
        0 0 46px rgba(0, 231, 255, 0.1);
      overflow: hidden;
      backdrop-filter: blur(22px);
      isolation: isolate;
    }

    .embed-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 12%, rgba(0, 231, 255, 0.12), transparent 34%),
        radial-gradient(circle at 82% 8%, rgba(139, 255, 90, 0.1), transparent 26%);
      pointer-events: none;
      z-index: 0;
    }

    .embed-shell::after {
      content: "";
      position: absolute;
      inset: -20% 20% auto;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 231, 255, 0.22), transparent 70%);
      filter: blur(24px);
      opacity: 0.75;
      pointer-events: none;
      z-index: 0;
    }

    iframe {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 472px;
      border: 0;
      display: block;
      background: transparent;
    }

    .play-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 220px;
      padding: 15px 28px;
      border-radius: 999px;
      border: 1px solid rgba(139, 255, 90, 0.26);
      background: linear-gradient(112deg, var(--brand-lime), var(--brand-cyan));
      color: #07131a;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-decoration: none;
      box-shadow:
        0 18px 40px rgba(0, 231, 255, 0.18),
        0 0 30px rgba(139, 255, 90, 0.18);
      transition: transform 0.2s ease, box-shadow 0.24s ease;
    }

    .play-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 22px 46px rgba(0, 231, 255, 0.24),
        0 0 34px rgba(139, 255, 90, 0.22);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid #07131a;
      margin-left: 2px;
    }

    @keyframes floatOrb {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      33% {
        transform: translate3d(18px, -22px, 0);
      }
      66% {
        transform: translate3d(-14px, 18px, 0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .focus-shell {
        gap: 16px;
      }

      .embed-shell {
        border-radius: 26px;
      }

      iframe {
        min-height: 432px;
      }

      .play-button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <main class="focus-shell">
    <h1 class="playlist-title" id="playlistTitle">Viral TikTok Edits</h1>

    <div class="embed-shell">
      <iframe
        id="playlistEmbed"
        title="Spotify Embed: 2026 VIRAL EDIT SONGS"
        loading="lazy"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        src="https://open.spotify.com/embed/playlist/3P8QL7XcWeBylAV9PRttd8?utm_source=generator">
      </iframe>
    </div>

    <a class="play-button" id="playButton" href="https://open.spotify.com/playlist/3P8QL7XcWeBylAV9PRttd8?si=b709896688e9495e" target="_blank" rel="noreferrer">
      <span class="play-icon" aria-hidden="true"></span>
      Play on Spotify
    </a>
  </main>

  <script>
    const PLAYLIST_URL = "https://open.spotify.com/playlist/3P8QL7XcWeBylAV9PRttd8?si=b709896688e9495e";
    const FALLBACK_PLAYLIST = {
      title: "2026 VIRAL EDIT SONGS 📈",
      iframeUrl: "https://open.spotify.com/embed/playlist/3P8QL7XcWeBylAV9PRttd8?utm_source=generator"
    };

    const playlistTitle = document.getElementById("playlistTitle");
    const playlistEmbed = document.getElementById("playlistEmbed");
    const playButton = document.getElementById("playButton");

    function applyPlaylistData(data) {
      const title = data?.title || FALLBACK_PLAYLIST.title;
      const iframeUrl = data?.iframe_url || FALLBACK_PLAYLIST.iframeUrl;

      if (playlistTitle) {
        playlistTitle.textContent = title;
      }

      if (playlistEmbed) {
        playlistEmbed.src = iframeUrl;
        playlistEmbed.title = `Spotify Embed: ${title}`;
      }

      if (playButton) {
        playButton.setAttribute("aria-label", `Play ${title} on Spotify`);
      }

      document.title = `${title} | Sigma Label LLC`;
    }

    async function syncSpotifyPlaylist() {
      applyPlaylistData(FALLBACK_PLAYLIST);

      try {
        const response = await fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(PLAYLIST_URL)}`, {
          headers: {
            Accept: "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Spotify metadata request failed");
        }

        const data = await response.json();
        applyPlaylistData(data);
      } catch (error) {
        applyPlaylistData(FALLBACK_PLAYLIST);
      }
    }

    syncSpotifyPlaylist();
  </script>
</body>
</html>
